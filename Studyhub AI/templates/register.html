<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Hub AI – Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            width: 100vw;
            background-color: #0c0d0e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Roboto', sans-serif;
        }
        .auth-card {
            background: #1e1f20;
            border: 1px solid #2a2b2d;
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .auth-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.25rem;
            font-weight: 700;
            color: #e3e3e3;
            margin-bottom: 32px;
        }
        .auth-logo span {
            background: linear-gradient(135deg, #4285F4, #9B72CB, #D96570);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.6rem;
        }
        .auth-card h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #e3e3e3;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .auth-card p {
            color: #9aa0a6;
            font-size: 0.92rem;
            margin-bottom: 28px;
        }
        .auth-field {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #3c4043;
            background: #141516;
            color: #e3e3e3;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 14px;
            display: block;
        }
        .auth-field:focus { border-color: #a8c7fa; }
        .auth-field::placeholder { color: #555; }
        .auth-btn {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            border: none;
            background: #a8c7fa;
            color: #050505;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            margin-top: 4px;
        }
        .auth-btn:hover { background: #d2e3fc; transform: translateY(-1px); }
        .auth-btn:active { transform: translateY(0); }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.88rem;
            color: #9aa0a6;
        }
        .auth-footer a { color: #a8c7fa; text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }
        .error-box {
            background: rgba(242,184,181,0.1);
            border: 1px solid rgba(242,184,181,0.3);
            color: #f2b8b5;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.87rem;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">
            <span>✧</span> Study Hub AI
        </div>

        <h2>Create Account</h2>
        <p>Start your learning journey today</p>

        {% if error %}
        <div class="error-box">⚠️ {{ error }}</div>
        {% endif %}

        <form method="post">
            <input class="auth-field" type="email" name="email" placeholder="Email address" required autocomplete="email">
            <input class="auth-field" type="password" name="password" placeholder="Password" required autocomplete="new-password">
            <button type="submit" class="auth-btn">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="{{ url_for('login') }}">Log in</a>
        </div>
    </div>
</body>
</html>
